<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Concrete Strength Predictor</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg1:#0f2027;
    --bg2:#203a43;
    --bg3:#2c5364;

    --card:#ffffff10;
    --border:#ffffff25;
    --primary:#3b82f6;
    --primary2:#06b6d4;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:'Inter',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:white;
}

/* Card */
.card{
    width:100%;
    max-width:900px;
    padding:40px;
    border-radius:22px;
    backdrop-filter:blur(22px);
    background:var(--card);
    border:1px solid var(--border);
    box-shadow:0 25px 60px rgba(0,0,0,.5);
    animation:fade .6s ease;
}

@keyframes fade{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1}
}

header{
    text-align:center;
    margin-bottom:28px;
}

header h1{
    font-size:28px;
    font-weight:700;
}

header p{
    opacity:.7;
    margin-top:6px;
}

/* Grid */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
}

.group{
    margin-bottom:22px;
}

.group h3{
    font-size:13px;
    opacity:.6;
    margin-bottom:10px;
    text-transform:uppercase;
}

/* Input */
.field{
    display:flex;
    flex-direction:column;
}

label{
    font-size:12px;
    margin-bottom:5px;
    opacity:.85;
}

input{
    padding:12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#ffffff15;
    color:white;
    font-size:14px;
}

input:focus{
    border-color:var(--primary);
    outline:none;
    transform:scale(1.02);
}

/* Button */
button{
    width:100%;
    padding:14px;
    margin-top:20px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,var(--primary),var(--primary2));
    font-weight:600;
    font-size:15px;
    color:#fff;
    cursor:pointer;
}

button:disabled{
    opacity:.6;
    cursor:not-allowed;
}

/* Result */
.result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:700;
    color:#22d3ee;
}

/* Spinner */
.spinner{
    width:16px;
    height:16px;
    border:2px solid white;
    border-top:2px solid transparent;
    border-radius:50%;
    display:inline-block;
    animation:spin 1s linear infinite;
    margin-left:8px;
}

@keyframes spin{
    to{transform:rotate(360deg)}
}

@media(max-width:640px){
    .grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="card">

<header>
    <h1>Concrete Strength Predictor</h1>
    <p>Enter mix parameters and predict compressive strength</p>
</header>

<form id="form">

    <div class="group">
        <h3>Binders</h3>
        <div class="grid">
            <div class="field"><label>Cement (kg/m³)</label><input name="cement" value="300"></div>
            <div class="field"><label>Slag</label><input name="slag" value="0"></div>
            <div class="field"><label>Fly Ash</label><input name="flyash" value="0"></div>
            <div class="field"><label>Water</label><input name="water" value="180"></div>
        </div>
    </div>

    <div class="group">
        <h3>Aggregates</h3>
        <div class="grid">
            <div class="field"><label>Coarse</label><input name="coarse" value="1000"></div>
            <div class="field"><label>Fine</label><input name="fine" value="800"></div>
        </div>
    </div>

    <div class="group">
        <h3>Other</h3>
        <div class="grid">
            <div class="field"><label>Superplasticizer</label><input name="sp" value="5"></div>
            <div class="field"><label>Age (days)</label><input name="age" value="28"></div>
        </div>
    </div>

    <button id="btn">Predict Strength</button>

</form>

<div id="result" class="result"></div>

</div>


<script>
const form = document.getElementById("form");
const btn = document.getElementById("btn");
const result = document.getElementById("result");

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = Object.fromEntries(new FormData(form));

    btn.disabled = true;
    btn.innerHTML = "Predicting <span class='spinner'></span>";
    result.innerHTML = "";

    const res = await fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    const json = await res.json();

    btn.disabled = false;
    btn.innerHTML = "Predict Strength";

    if(json.success){
        result.innerHTML = `Predicted Strength: ${json.prediction} MPa`;
    }else{
        result.innerHTML = "Error occurred";
    }
});
</script>

</body>
</html>
